<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Visiting Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#141A22;
    --paper:#EEF0F0;
    --gold:#B9922F;
    --teal:#33534B;
    --slate:#5B6572;
    --line: rgba(20,26,34,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    font-family:'Inter',sans-serif;
  }
  .card{
    width:420px;
    max-width:100%;
    background:var(--paper);
    border-radius:4px;
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,0.4);
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:5px;
    background:linear-gradient(90deg,var(--teal),var(--gold));
  }
  .header{
    padding:36px 32px 24px;
    display:flex;
    align-items:center;
    gap:16px;
    border-bottom:1px solid var(--line);
  }
  .logo{
    height:40px;width:auto;max-width:140px;
    object-fit:contain;
  }
  .company-name{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--slate);
  }
  .body{
    padding:28px 32px 8px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:32px;
    font-weight:600;
    margin:0 0 4px;
    color:var(--ink);
    line-height:1.1;
  }
  .title{
    font-size:14px;
    color:var(--teal);
    font-weight:500;
    margin-bottom:20px;
  }
  .field-group{
    margin-bottom:18px;
  }
  .field{
    display:flex;
    gap:12px;
    font-size:13.5px;
    color:var(--ink);
    padding:6px 0;
    border-bottom:1px dashed var(--line);
  }
  .field:last-child{border-bottom:none;}
  .field .label{
    width:64px;
    flex-shrink:0;
    color:var(--slate);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding-top:2px;
    font-weight:500;
  }
  .field .value{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    word-break:break-word;
  }
  .field a{color:var(--ink);text-decoration:none;}
  .field a:hover{color:var(--teal);}

  .seal{
    margin:8px 32px 0;
    padding:14px 16px;
    background:rgba(51,83,75,0.06);
    border:1px solid rgba(51,83,75,0.25);
    border-radius:4px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .seal-badge{
    width:38px;height:38px;
    border-radius:50%;
    border:2px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    background:#fff;
  }
  .seal-badge svg{width:18px;height:18px;stroke:var(--gold);}
  .seal-text{font-size:11.5px;line-height:1.4;color:var(--ink);}
  .seal-text strong{color:var(--teal);}
  .seal img{height:20px;vertical-align:middle;margin-left:4px;}

  .footer{
    padding:24px 32px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  #qrcode{
    line-height:0;
  }
  .actions{
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-end;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:10px 16px;
    border-radius:3px;
    border:none;
    cursor:pointer;
    text-decoration:none;
    text-align:center;
  }
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-linkedin{background:transparent;color:var(--teal);border:1px solid var(--teal);}
  .scan-hint{font-size:10.5px;color:var(--slate);text-align:center;margin-top:6px;}
</style>
</head>
<body>

<div class="card">
  <div id="cardVisual">
    <div class="header">
      <img class="logo" id="logoImg" alt="Company logo">
      <div class="company-name" id="companyNameHeader"></div>
    </div>

    <div class="body">
      <h1 id="fullName"></h1>
      <div class="title" id="jobTitle"></div>

      <div class="field-group">
        <div class="field"><div class="label">Mobile</div><div class="value"><a id="phoneMobileLink"></a></div></div>
        <div class="field"><div class="label">Office</div><div class="value" id="phoneOfficeValue"></div></div>
        <div class="field"><div class="label">Email</div><div class="value"><a id="emailLink"></a></div></div>
        <div class="field"><div class="label">Web</div><div class="value"><a id="websiteLink" target="_blank"></a></div></div>
        <div class="field"><div class="label">Address</div><div class="value"><a id="addressLink" target="_blank"></a></div></div>
        <div class="field"><div class="label">Profile</div><div class="value"><a id="companyProfileLink" target="_blank">Our Capabilities</a></div></div>
      </div>
    </div>

    <div class="seal">
      <div class="seal-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.6 5.6L21 8.3l-4.5 4.2 1.1 6.2L12 15.8 6.4 18.7l1.1-6.2L3 8.3l6.4-.7z"/></svg>
      </div>
      <div class="seal-text">
        Authorised Regional Distributor for<br>
        <img id="distributorLogo" alt="Partner logo">
      </div>
    </div>
  </div>

  <div class="footer">
    <div>
      <div id="qrcode"></div>
      <div class="scan-hint">Scan to open & save contact</div>
    </div>
    <div class="actions" id="actionsBlock">
      <a class="btn btn-primary" id="saveContactLink">Save Contact</a>
      <a class="btn btn-linkedin" id="linkedinBtn" target="_blank">LinkedIn</a>
    </div>
  </div>
</div>

<script>
// ============ EDIT THIS BLOCK WITH YOUR REAL DETAILS ============
const CONFIG = {
  fullName: "Shambulingappa M H",
  jobTitle: "Director",
  companyName: "Horizon Tech",
  companyAddress: "Manjushree, no9, W Link Rd, Malleshwaram, Bengaluru, Karnataka 560003",
  companyMapUrl: "https://www.google.com/maps/place/Horizon+Tech+B2B+Solutions+Pvt+Ltd/@12.9953296,77.5683397,17z/data=!4m14!1m7!3m6!1s0x3bae17c24d6f4dc5:0x6cbcf5c0ae395acc!2sHorizon+Tech+B2B+Solutions+Pvt+Ltd!8m2!3d12.9953244!4d77.5732106!16s%2Fg%2F11fvmpbmgl!3m5!1s0x3bae17c24d6f4dc5:0x6cbcf5c0ae395acc!8m2!3d12.9953244!4d77.5732106!16s%2Fg%2F11fvmpbmgl?entry=ttu&g_ep=EgoyMDI2MDcxNS4wIKXMDSoASAFQAw%3D%3D",
  phoneMobile: "+91 77604 98086",
  phoneOffice: ["080 23566141", "080 23566142"],
  email: "shambu@horizontechb2b.com",
  website: "https://horizontechb2b.com",
  companyLogoUrl: "img-logo.jpg",
  companyProfileUrl: "Horizon Tech PPT-2.pdf",
  linkedinUrl: "https://www.linkedin.com/in/shambulingappa-mh-16972621/",
  distributorOfName: "LG",
  distributorOfLogoUrl: "LG-Logo.png.webp"
};
// ==================================================================

document.getElementById('logoImg').src = CONFIG.companyLogoUrl;
document.getElementById('companyNameHeader').textContent = CONFIG.companyName;
const nameWords = CONFIG.fullName.trim().split(' ');
document.getElementById('fullName').innerHTML = nameWords.slice(0, -2).join(' ') + '<br>' + nameWords.slice(-2).join(' ');
document.getElementById('jobTitle').textContent = CONFIG.jobTitle + " — " + CONFIG.companyName;

const mLink = document.getElementById('phoneMobileLink');
mLink.textContent = CONFIG.phoneMobile; mLink.href = "tel:" + CONFIG.phoneMobile.replace(/\s/g,'');

document.getElementById('phoneOfficeValue').innerHTML = CONFIG.phoneOffice
  .map(num => `<a href="tel:${num.replace(/\s/g,'')}">${num}</a>`)
  .join(', ');

const eLink = document.getElementById('emailLink');
eLink.textContent = CONFIG.email; eLink.href = "mailto:" + CONFIG.email;

const wLink = document.getElementById('websiteLink');
wLink.textContent = CONFIG.website.replace(/^https?:\/\//,''); wLink.href = CONFIG.website;

const addressLink = document.getElementById('addressLink');
addressLink.textContent = CONFIG.companyAddress;
addressLink.href = CONFIG.companyMapUrl;
document.getElementById('companyProfileLink').href = CONFIG.companyProfileUrl;
document.getElementById('distributorLogo').src = CONFIG.distributorOfLogoUrl;

const li = document.getElementById('linkedinBtn');
li.textContent = "LinkedIn"; li.href = CONFIG.linkedinUrl;

function buildVCard(){
  return [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N:;Shambulingappa MH - ${CONFIG.companyName};;;`,
    `FN:Shambulingappa MH - ${CONFIG.companyName}`,
    `ORG:${CONFIG.companyName}`,
    `TITLE:${CONFIG.jobTitle}`,
    `TEL;TYPE=CELL:${CONFIG.phoneMobile}`,
    ...CONFIG.phoneOffice.map(num => `TEL;TYPE=WORK:${num}`),
    `EMAIL:${CONFIG.email}`,
    `URL:${CONFIG.website}`,
    `ADR;TYPE=WORK:;;${CONFIG.companyAddress.replace(/,/g,';')}`,
    `URL;TYPE=LinkedIn:${CONFIG.linkedinUrl}`,
    "END:VCARD"
  ].join("\n");
}

// iOS: a plain data: URI (no download attribute, no Blob) reliably triggers
// the native "Add Contact" screen; adding `download` makes iOS just download
// the file instead. Android: the opposite — Chrome shows/blocks a bare data:
// link instead of saving, so it needs a Blob + download="*.vcf" (tapping the
// downloaded file notification opens it in Contacts).
const saveLink = document.getElementById('saveContactLink');
const vcard = buildVCard();
if (/iP(hone|od|ad)/.test(navigator.userAgent)) {
  saveLink.href = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcard);
} else {
  saveLink.href = URL.createObjectURL(new Blob([vcard], {type: 'text/vcard'}));
  saveLink.download = CONFIG.fullName.replace(/\s/g,'_') + '.vcf';
}

// Add ?jpg=1 to the URL to download a JPG snapshot of the card (regenerate
// any time by editing CONFIG above and reopening with ?jpg=1). Doesn't touch
// the live page, so links (email/web/tel) stay clickable as normal.
async function maybeDownloadJpg(){
  if (new URLSearchParams(location.search).get('jpg') !== '1') return;
  const canvas = await html2canvas(document.getElementById('cardVisual'), {scale: 3, backgroundColor: '#EEF0F0'});
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg', 0.95);
  a.download = CONFIG.fullName.replace(/\s/g,'_') + "_card.jpg";
  a.click();
}
maybeDownloadJpg();

// Points at wherever this page ends up hosted, so scanning it opens the
// live page (image to save + Save Contact button) instead of a plain vCard.
// (Won't resolve to anything for other phones until this file is hosted
// at a real URL instead of opened as a local file://.)
new QRCode(document.getElementById("qrcode"), {
  text: location.href.split(/[?#]/)[0],
  width: 96,
  height: 96,
  colorDark: "#141A22",
  colorLight: "#ffffff"
});
// qrcodejs has a known bug where its <canvas> render gets extra blank
// space on high-DPI screens; it also draws a correct fallback <img> that
// it just leaves hidden, so use that instead.
document.querySelectorAll('#qrcode canvas').forEach(c => c.style.display = 'none');
document.querySelectorAll('#qrcode img').forEach(i => i.style.display = 'block');
</script>
</body>
</html>
